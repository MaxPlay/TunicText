<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunic Text</title>
    <link rel="stylesheet" href="tunictext.css">
    <script src="out/tunictext.js"></script>
</head>

<body>
    <h1>Tunic Text</h1>

    <main>
        <div class="area" style="grid-area: main;">
            <h2>Output</h2>
            <canvas id="text-canvas" height="400" width="800">
            </canvas>
            <div style="margin: 10px 70px;">
                <input id="string" type="text" />
                <button id="load">Load</button>
                <button id="clear">Clear</button>
                <input id="phonetics" type="text" />
            </div>
        </div>
        <div id="editor" class="area">
            <h2>Editor</h2>
            <canvas id="glyph-canvas" height="160" width="120" style="float:left; margin: 10px">
            </canvas>
            <div id="editor_controls">
            </div>
        </div>
    </main>
</body>

</html>
