name: 'Deploy Tunic Text'
run-name: 'Deploying the 🦊 keyboard'

# Triggers
on:
  push:
    branches: ['test']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 'Build'
    runs-on: ubuntu-latest
    steps:
      - name: 'checkout'
        uses: actions/checkout@v5
      - name: 'setup'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: 'build'
        run: npm ci & npm run build
      - name: 'upload'
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'
  deploy:
    name: 'Deploy'
    needs: build
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 'Deploy to GitHub Pages'
        id: deployment
        uses: actions/deploy-pages@v4
